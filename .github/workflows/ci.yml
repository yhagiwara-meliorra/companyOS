name: CI

on:
  push:
    branches: [main]
    paths:
      - "apps/cocolog/**"
      - ".github/workflows/ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "apps/cocolog/**"
      - ".github/workflows/ci.yml"

defaults:
  run:
    working-directory: apps/cocolog

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: apps/cocolog/pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder

  migration-check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: github.event_name == 'pull_request'

    steps:
      - uses: actions/checkout@v4

      - name: Check for new migrations
        run: |
          CHANGED=$(git diff --name-only origin/main...HEAD -- apps/cocolog/supabase/migrations/)
          if [ -n "$CHANGED" ]; then
            echo "::warning::New migration files detected — review before merging:"
            echo "$CHANGED"
          else
            echo "No migration changes."
          fi
