name: CI

on:
  push:
    branches: [main]
    paths:
      - "apps/cocolog/**"
  pull_request:
    branches: [main]
    paths:
      - "apps/cocolog/**"

defaults:
  run:
    working-directory: apps/cocolog

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: apps/cocolog/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint

  typecheck:
    name: TypeCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: apps/cocolog/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: apps/cocolog/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm test

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test]
    env:
      NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: apps/cocolog/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm build

  db-check:
    name: Database Migration Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate SQL migration files exist
        run: |
          if [ ! -d supabase/migrations ]; then
            echo "ERROR: supabase/migrations directory not found"
            exit 1
          fi
          count=$(ls -1 supabase/migrations/*.sql 2>/dev/null | wc -l)
          echo "Found $count migration files"
          if [ "$count" -eq 0 ]; then
            echo "ERROR: No migration files found"
            exit 1
          fi
