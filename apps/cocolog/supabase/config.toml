project_id = "cocolog"

[api]
enabled = true
port = 54321
schemas = ["public", "integrations", "ai", "analytics", "billing", "ops", "audit"]
extra_search_path = ["public", "integrations", "ai", "analytics", "billing", "ops", "audit"]
max_rows = 1000

[db]
port = 54322
major_version = 15

[studio]
enabled = true
port = 54323

[auth]
enabled = true
site_url = "http://localhost:3000"
additional_redirect_urls = ["http://localhost:3000/auth/callback"]
jwt_expiry = 3600
enable_signup = true

[storage]
enabled = false

[auth.external.slack_oidc]
enabled = true
client_id = "env(SLACK_OIDC_CLIENT_ID)"
secret = "env(SLACK_OIDC_CLIENT_SECRET)"
redirect_uri = "http://localhost:54321/auth/v1/callback"
